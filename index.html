<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de médias</title>
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <div class="container">
        <header>
        <img src="./images/logo.png" alt="Capelo e diploma">
        <h1>Calculadora de Médias</h1>
    </header>
    <form id="form-atividade">
        <input type="text" id="nome-atividade" required placeholder="Nome da atividade">
        <input type="number" id="nota-atividade" required placeholder="Nota da atividade">
        <button type="submit">Adicionar +</button>
    </form>
    <table cellspacing="0">
        <thead>
            <tr>
                <th>Nome da atividade</th>
                <th>Nota da atividade</th>
                <th>Aprovado?</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Atividade 1</td>
                <td>7</td>
                <td><img src="./images/aprovado.png" alt="Emoji festejando"></td>
                <td><button class="btn-delete">Apagar</button></td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Média final</td>
                <td>7</td>
                <td><span class="resultado aprovado">Aprovado</span></td>
                <td><button id="btn-definir-media" class="btn-media">Definir Média</button></td>
            </tr>
        </tfoot>
    </table>
</div>

<!-- Modal para definir média -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2>Definir Média Desejada</h2>
        <p>Digite a média que você deseja como referência:</p>
        <input type="number" id="media-desejada" min="0" max="10" step="0.1" placeholder="Digite a média (ex: 7)">
        <div class="modal-buttons">
            <button id="btn-confirmar" class="btn-confirm">Confirmar</button>
            <button id="btn-cancelar" class="btn-cancel">Cancelar</button>
        </div>
    </div>
</div>

<script src="./main.js"></script>
</body>
</html>
